<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="모여플">

  <meta property="og:title" content="모리의 여행플랜" />
  <meta property="og:description" content="나의 여행 이야기" />
  <meta property="og:image" content="https://simbaking84.github.io/travel-app/og-image-ko.png?v=3" />
  <meta property="og:url" content="https://simbaking84.github.io/travel-app/" />

  <meta name="theme-color" content="#12254b">

  <!-- 실제 GitHub에 올라간 정확한 파일명 (RealFaviconGenerator로 생성된 세트) -->
  <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon-96x96.png?v=4" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg?v=4" />
  <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico?v=4" />
  <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png?v=4" />
  <link rel="manifest" href="%PUBLIC_URL%/site.webmanifest?v=4" />

  <title>모리의 여행플랜</title>

  <!-- 기존 배포본과 동일한 폰트/아이콘 CDN -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

  <!-- ✅ 카카오 인앱브라우저 감지 — 오류 발생 시에만 배너 표시 (기존 패치 유지) -->
  <script>
  (function(){
    var ua = navigator.userAgent || '';
    var isKakao = /KAKAOTALK/i.test(ua);
    if(!isKakao) return;
    window.addEventListener('error', function onErr(e){
      if(document.getElementById('kakao-banner')) return;
      var banner = document.createElement('div');
      banner.id = 'kakao-banner';
      banner.style.cssText = [
        'position:fixed','top:0','left:0','right:0','z-index:9999',
        'background:#FEE500','color:#3C1E1E','font-size:13px',
        'padding:12px 16px','display:flex','align-items:center','gap:10px',
        'font-family:sans-serif','box-shadow:0 2px 8px rgba(0,0,0,.2)'
      ].join(';');
      banner.innerHTML = [
        '<span style="font-size:18px">⚠️</span>',
        '<span style="flex:1">카카오톡 브라우저에서 일부 기능에 오류가 발생했어요.<br>',
        '<b>우측 상단 ··· → 다른 브라우저로 열기</b>를 이용해 주세요.</span>',
        '<button onclick="document.getElementById(\'kakao-banner\').remove()" ',
        'style="background:none;border:none;font-size:18px;cursor:pointer;color:#3C1E1E;padding:4px">✕</button>'
      ].join('');
      document.body.insertBefore(banner, document.body.firstChild);
    });
  })();
  </script>
</head>
<body>
  <noscript>이 앱을 사용하려면 JavaScript를 활성화해주세요.</noscript>
  <div id="root"></div>

  <!-- ⚠️ 필수: Google Drive 연동(GIS)용 -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script>
    var isLocalDev = /^(localhost|127\.0\.0\.1)$/.test(window.location.hostname);
    if ('serviceWorker' in navigator && !isLocalDev) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('%PUBLIC_URL%/service-worker.js')
          .then(function (reg) {
            console.log('SW registered:', reg.scope);
            setInterval(function () { reg.update(); }, 60 * 1000);
          })
          .catch(function (err) { console.log('SW registration failed:', err); });
      });

      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    }
  </script>
</body>
</html>
