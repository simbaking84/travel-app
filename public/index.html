  <script>
  (function(){
    var ua = navigator.userAgent || '';
    var isKakao = /KAKAOTALK/i.test(ua);
    if(!isKakao) return;
    window.addEventListener('error', function onErr(e){
      if(document.getElementById('kakao-banner')) return;
      var banner = document.createElement('div');
      banner.id = 'kakao-banner';
      banner.style.cssText = [
        'position:fixed','top:0','left:0','right:0','z-index:9999',
        'background:#FEE500','color:#3C1E1E','font-size:13px',
        'padding:12px 16px','display:flex','align-items:center','gap:10px',
        'font-family:sans-serif','box-shadow:0 2px 8px rgba(0,0,0,.2)'
      ].join(';');
      banner.innerHTML = [
        '<span style="font-size:18px">⚠️</span>',
        '<span style="flex:1">카카오톡 브라우저에서 일부 기능에 오류가 발생했어요.<br>',
        '<b>우측 상단 ··· → 다른 브라우저로 열기</b>를 이용해 주세요.</span>',
        '<button onclick="document.getElementById(\'kakao-banner\').remove()" ',
        'style="background:none;border:none;font-size:18px;cursor:pointer;color:#3C1E1E;padding:4px">✕</button>'
      ].join('');
      document.body.insertBefore(banner, document.body.firstChild);
    });
  })();
  </script>

<body>
  <noscript>모리의 여행플랜 — 여행 일정, 예산, 체크리스트를 한 곳에서 관리하는 개인 여행 플래너입니다. 이 앱을 사용하려면 JavaScript를 활성화해주세요. <a href="%PUBLIC_URL%/privacy.html">개인정보처리방침</a></noscript>
  <div id="root"></div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script>
    var isLocalDev = /^(localhost|127\.0\.0\.1)$/.test(window.location.hostname);
    if ('serviceWorker' in navigator && !isLocalDev) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('%PUBLIC_URL%/service-worker.js')
          .then(function (reg) {
            console.log('SW registered:', reg.scope);
            setInterval(function () { reg.update(); }, 60 * 1000);
          })
          .catch(function (err) { console.log('SW registration failed:', err); });
      });

      let refreshing = false;
navigator.serviceWorker.addEventListener('controllerchange', function () {
  if (refreshing) return;
  var isFirstVisit = !localStorage.getItem('onboarding_seen_v1');
  if (isFirstVisit) return;
  refreshing = true;
  window.location.reload();
});
    }
  </script>
